// Two taps within 2.5s: mid-run restarts shouldn't happen on a stray click.
function armRestart() {
  if (S.awaitingStart) return;
  if (restartArm) {
    clearTimeout(restartArm);
    restartArm = null;
    restart();
    return;
  }
  const label = document.getElementById('q-restart-label');
  if (label) label.textContent = 'SURE?';
  restartArm = setTimeout(() => {
    restartArm = null;
    const l = document.getElementById('q-restart-label');
    if (l) l.textContent = 'RESTART';
  }, 2500);
}

function toggleSettings() {
  document.getElementById('q-settings').classList.toggle('open');
}

function toggleFullscreen() {
  if (document.fullscreenElement) {
    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
  } else if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}

function applyTouchMode() {
  const bar = document.getElementById('q-touch');
  if (bar) bar.style.display = S.settings.touchMode === 'gestures' ? 'none' : '';
}
function applyHint() {
  const p = document.getElementById('q-hint-panel');
  if (p) p.style.display = S.settings.showHint ? '' : 'none';
}
function setToggle(btn, on) {
  btn.dataset.on = on ? '1' : '0';
  btn.setAttribute('aria-checked', on ? 'true' : 'false');
}

function wireSettings() {
  const $ = (id) => document.getElementById(id);
  const speed = $('set-speed'), grid = $('set-grid'), sdm = $('set-sdm'), sdmVal = $('set-sdm-val');
  const rings = $('set-rings'), hint = $('set-hint'), touch = $('set-touch');
  speed.value = S.settings.speed;
  grid.value = String(S.settings.gridSize);
  sdm.value = String(S.settings.softDropMult);
  sdmVal.textContent = `×${S.settings.softDropMult}`;
  setToggle(rings, S.settings.showRings);
  setToggle(hint, S.settings.showHint);
  touch.value = S.settings.touchMode;
  const commit = () => { saveSettings(S.settings); update(); };
  speed.addEventListener('change', () => { S.settings.speed = speed.value; commit(); });
  grid.addEventListener('change', () => {
    const sz = Number(grid.value);
    if (S.awaitingStart) { menuSize = sz; S.settings.gridSize = sz; commit(); return; }
    startNewRun(sz, S.mode === 'daily' ? 'classic' : S.mode);
  });
  sdm.addEventListener('input', () => {
    S.settings.softDropMult = Number(sdm.value);
    sdmVal.textContent = `×${S.settings.softDropMult}`;
    saveSettings(S.settings);
  });
  rings.addEventListener('click', () => { S.settings.showRings = !S.settings.showRings; setToggle(rings, S.settings.showRings); commit(); });
  hint.addEventListener('click', () => { S.settings.showHint = !S.settings.showHint; setToggle(hint, S.settings.showHint); applyHint(); commit(); });
  touch.addEventListener('change', () => { S.settings.touchMode = touch.value; applyTouchMode(); commit(); });
  $('set-fs').addEventListener('click', toggleFullscreen);
  $('set-close').addEventListener('click', toggleSettings);
}

// --- keyboard (wired once; DAS handled per-frame) ---------------------------
function wireKeys() {
  if (keyListenersWired) return;
  keyListenersWired = true;
  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === 'ArrowLeft') {
      e.preventDefault();
      if (!e.repeat) { dasHeld.left = true; dasStart(-1); }
    } else if (k === 'ArrowRight') {
      e.preventDefault();
      if (!e.repeat) { dasHeld.right = true; dasStart(1); }
    } else if (k === 'ArrowUp') {
      e.preventDefault();
      if (!e.repeat) action('rotCW');
    } else if (k === 'z' || k === 'Z') {
      if (!e.repeat) action('rotCCW');
    } else if (k === 'ArrowDown') {
      e.preventDefault();
      if (!e.repeat) action('down');
    } else if (k === ' ') {
      e.preventDefault();
      if (!e.repeat) action('hardDrop');
    } else if (k === 'r' || k === 'R') {
      if (!e.repeat) action('boardCW');
    } else if (k === 'e' || k === 'E') {
      if (!e.repeat) action('boardCCW');
    } else if (k === 'b' || k === 'B') {
      if (!e.repeat) action('bomb');
    } else if (k === 'c' || k === 'C') {
      if (!e.repeat) action('hold');
    } else if (k === 'p' || k === 'P') {
      if (!e.repeat) action('pause');
    } else if (k === 'Enter') {
      if (S.gameOver && !S.awaitingStart) restart();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowDown') S.softDrop = false;
    else if (e.key === 'ArrowLeft') { dasHeld.left = false; if (dasDir === -1) dasStop(); }
    else if (e.key === 'ArrowRight') { dasHeld.right = false; if (dasDir === 1) dasStop(); }
  });
}

// --- touch buttons -----------------------------------------------------------
function attachRepeat(btn, fn) {
  const start = (e) => {
    e.preventDefault();
    if (btn.setPointerCapture) { try { btn.setPointerCapture(e.pointerId); } catch (err) {} }
    fn();
    clearTimeout(touchHoldTimer);
    clearInterval(touchRepeatTimer);
    touchHoldTimer = setTimeout(() => { touchRepeatTimer = setInterval(fn, 60); }, 220);
  };
  const stop = () => { clearTimeout(touchHoldTimer); clearInterval(touchRepeatTimer); };
  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', stop);
  btn.addEventListener('pointercancel', stop);
  btn.addEventListener('pointerleave', stop);
}

function wireTouchControls() {
  const $ = (id) => document.getElementById(id);
  attachRepeat($('q-t-left'), () => action('left'));
  attachRepeat($('q-t-right'), () => action('right'));
  attachRepeat($('q-t-down'), () => {
    if (!S.piece || S.paused || S.gameOver || S.rotating || S.collapsing || S.flash) return;
    if (S.grounded) { lockAndClear(S.piece); return; } // tap while landed = lock now
    gestureSoftStep();
  });
  const tap = (id, fn) => $(id).addEventListener('pointerdown', (e) => { e.preventDefault(); fn(); });
  tap('q-t-rotccw', () => action('rotCCW'));
  tap('q-t-rotcw', () => action('rotCW'));
  tap('q-t-drop', () => action('hardDrop'));
  tap('q-t-hold', () => action('hold'));
  tap('q-t-bomb', () => action('bomb'));
  tap('q-t-pause', () => action('pause'));
  tap('q-t-boardccw', () => action('boardCCW'));
  tap('q-t-boardcw', () => action('boardCW'));
}

// --- swipe gestures on the board ----------------------------------------------
// Drag horizontally to move cell-by-cell, drag down to soft drop, flick down
// to hard drop, tap to rotate. Disabled via "Buttons only" in Tweaks.
let sw = null;
function wireSwipe() {
  const area = el.boardOuter;
  area.addEventListener('pointerdown', (e) => {
    if (e.pointerType !== 'touch') return;
    if (S.settings.touchMode === 'buttons') return;
    if (S.awaitingStart || S.gameOver || S.paused || !S.piece) return;
    if (e.target.closest('button')) return;
    const rect = el.pieces.getBoundingClientRect();
    sw = {
      id: e.pointerId, x0: e.clientX, y0: e.clientY, t0: performance.now(),
      pitch: Math.max(8, rect.width / SIZE), axis: null, sx: 0, sy: 0,
    };
    if (area.setPointerCapture) { try { area.setPointerCapture(e.pointerId); } catch (err) {} }
  });
  area.addEventListener('pointermove', (e) => {
    if (!sw || e.pointerId !== sw.id) return;
    const dx = e.clientX - sw.x0, dy = e.clientY - sw.y0;
    if (!sw.axis) {
      if (Math.abs(dx) > sw.pitch * 0.6) sw.axis = 'x';
      else if (dy > sw.pitch * 0.6) sw.axis = 'y';
      else return;
    }
    if (sw.axis === 'x') {
      const steps = Math.trunc(dx / sw.pitch) - sw.sx;
      for (let i = 0; i < Math.abs(steps); i++) action(steps > 0 ? 'right' : 'left');
      sw.sx += steps;
    } else {
      const steps = Math.trunc(dy / sw.pitch) - sw.sy;
      for (let i = 0; i < steps; i++) gestureSoftStep();
      if (steps > 0) sw.sy += steps;
    }
  });
  const end = (e) => {
    if (!sw || e.pointerId !== sw.id) return;
    const dt = performance.now() - sw.t0;
    const dx = e.clientX - sw.x0, dy = e.clientY - sw.y0;
    if (!sw.axis && dt < 300 && Math.abs(dx) < 10 && Math.abs(dy) < 10) action('rotCW');
    else if (sw.axis === 'y' && dt < 260 && dy > sw.pitch * 1.8) action('hardDrop');
    sw = null;
  };
  area.addEventListener('pointerup', end);
  area.addEventListener('pointercancel', () => { sw = null; });
}

// --- board scaling -------------------------------------------------------------
function fitBoard() {
  if (!el.boardOuter || !el.scale) return;
  const w = el.boardOuter.clientWidth - 8, h = el.boardOuter.clientHeight - 8;
  if (w <= 0 || h <= 0) return;
  const nat = BOARD_PX + 18;
  const s = Math.max(0.2, Math.min(w / nat, h / nat, 1.6));
  el.scale.style.transform = `scale(${s})`;
}
function observeScale() {
  if (scaleObserver) scaleObserver.disconnect();
  scaleObserver = new ResizeObserver(fitBoard);
  scaleObserver.observe(el.boardOuter);
  if (!scaleResizeHandler) {
    scaleResizeHandler = () => fitBoard();
    window.addEventListener('resize', scaleResizeHandler);
  }
  fitBoard();
}

// --- global one-time wiring ------------------------------------------------------
function wireGlobal() {
  if (globalWired) return;
  globalWired = true;
  // Auto-pause when the tab is hidden or the window loses focus: background
  // tabs throttle timers erratically, and an unattended run shouldn't die.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && !S.paused && !S.gameOver && !S.awaitingStart) {
      S.paused = true;
      saveRun();
      update();
    }
  });
  window.addEventListener('blur', () => {
    dasHeld.left = dasHeld.right = false;
    dasDir = 0;
    S.softDrop = false;
    if (!S.paused && !S.gameOver && !S.awaitingStart) {
      S.paused = true;
      saveRun();
      update();
    }
  });
  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
}

// ===================================================================
// Boot — build the shell and show the mode/size menu; the rAF loop idles
// until a run starts.
// ===================================================================
configureGrid(GRID_SIZES.includes(S.settings.gridSize) ? S.settings.gridSize : 31);
S.grid = emptyGrid();
buildShell();
wireGlobal();
rafId = requestAnimationFrame(frame);
</script>
</body>
