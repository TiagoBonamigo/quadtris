<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Quadtris</title>
<meta name="description" content="Quadtris — a center-out tetromino game. Build outward from the core, complete concentric rings, survive the collapse.">
<meta name="theme-color" content="#15171d">
<meta property="og:title" content="Quadtris">
<meta property="og:description" content="A center-out tetromino game. Build outward from the core, complete concentric rings, survive the collapse.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tiagobonamigo.github.io/quadtris/">
<meta property="og:image" content="https://tiagobonamigo.github.io/quadtris/icon-512.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        oklch(0.16 0.012 250);
    --bg-2:      oklch(0.21 0.016 250);
    --bg-3:      oklch(0.26 0.018 250);
    --line:      oklch(0.32 0.020 250);
    --line-soft: oklch(0.24 0.014 250);
    --fg:        oklch(0.96 0.008 250);
    --fg-2:      oklch(0.78 0.014 250);
    --fg-mute:   oklch(0.55 0.018 250);
    --accent:    oklch(0.78 0.14 200);
    --warn:      oklch(0.78 0.16 30);
    --core:      oklch(0.90 0.05 80);
    --core-2:    oklch(0.80 0.07 80);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-feature-settings: "ss01", "ss02";
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #root { width: 100%; height: 100%; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  button { font-family: inherit; }
  ::selection { background: var(--accent); color: var(--bg); }
  .sr-only {
    position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  @keyframes q-rotate-cw  { from { transform: rotate(0deg); }   to { transform: rotate(90deg);  } }
  @keyframes q-rotate-ccw { from { transform: rotate(0deg); }   to { transform: rotate(-90deg); } }
  .q-rot-cw  { animation: q-rotate-cw  320ms cubic-bezier(0.7, 0, 0.3, 1) forwards; }
  .q-rot-ccw { animation: q-rotate-ccw 320ms cubic-bezier(0.7, 0, 0.3, 1) forwards; }
  @keyframes q-ghost-warn { 0%, 100% { opacity: 0.9; } 50% { opacity: 0.35; } }
  @keyframes q-bump { 0% { transform: scale(1); } 30% { transform: scale(1.25); color: var(--accent); } 100% { transform: scale(1); } }
  .stat-value.bump { animation: q-bump 500ms ease; }

  /* ---- layout ---- */
  .app {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    background: radial-gradient(circle at 50% 40%, oklch(0.22 0.022 250) 0%, var(--bg) 65%);
  }
  .frame {
    width: 100%; max-width: 1280px; height: 100%; max-height: 920px;
    display: flex; flex-direction: column; gap: 12px; min-height: 0;
  }

  /* header */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .wordmark { font-size: 22px; font-weight: 700; letter-spacing: 0.18em; }
  .tagline { font-size: 11px; color: var(--fg-mute); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 2px; }
  .stats { display: flex; gap: 24px; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .stat-label { font-size: 10px; letter-spacing: 0.22em; color: var(--fg-mute); }
  .stat-value { font-size: 24px; font-weight: 500; }
  .score-mult { font-size: 9px; color: var(--fg-mute); letter-spacing: 0.06em; }

  /* middle */
  .middle {
    flex: 1; display: grid;
    grid-template-columns: minmax(200px, 240px) minmax(0, 1fr) minmax(200px, 240px);
    gap: 16px; min-height: 0;
  }
  .rail { display: flex; flex-direction: column; gap: 10px; min-width: 0; min-height: 0; overflow: auto; }
  .panel {
    background: var(--bg-2); border: 1px solid var(--line-soft); border-radius: 8px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .panel-title { font-size: 10px; letter-spacing: 0.22em; color: var(--fg-mute); }
  .panel-body { display: flex; flex-direction: column; gap: 8px; }

  .preview-box {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 8px 6px; background: var(--bg);
    border: 1px solid var(--line-soft); border-radius: 6px;
  }
  .piece-tag {
    font-size: 10px; letter-spacing: 0.18em; padding: 2px 8px;
    border: 1px solid; border-radius: 4px; align-self: flex-start;
  }
  .kicker { font-size: 9px; letter-spacing: 0.22em; color: var(--fg-mute); }
  .from-val { font-size: 13px; color: var(--fg); letter-spacing: 0.10em; }
  .current-row { display: flex; align-items: center; gap: 14px; }
  .placeholder { color: var(--fg-mute); text-align: center; padding: 10px 0; font-size: 14px; }

  .hint { font-size: 12px; line-height: 1.55; color: var(--fg-2); }
  .hint strong { color: var(--fg); }

  .controls { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
  .ctrl-k { color: var(--fg-2); }
  .ctrl-v { color: var(--fg); }

  .actions-col { display: flex; flex-direction: column; gap: 6px; }
  .big-btn {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: var(--bg-2);
    border: 1px solid var(--line); border-radius: 6px;
    color: var(--fg); cursor: pointer; font-size: 12px; letter-spacing: 0.16em;
    transition: background 100ms linear;
  }
  .big-btn:hover { background: var(--bg-3); }
  .big-btn-label { font-weight: 500; }
  .big-btn-sub { font-size: 10px; color: var(--fg-mute); letter-spacing: 0.16em; }

  /* board */
  .board-outer {
    position: relative; display: flex; align-items: center; justify-content: center;
    min-width: 0; min-height: 0; width: 100%; height: 100%; overflow: hidden;
    touch-action: none;
  }
  .board {
    background: var(--bg); border: 1px solid var(--line); border-radius: 12px;
    position: relative;
    box-shadow: 0 18px 48px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.02);
  }
  .q-grid { display: grid; gap: 2px; }
  .arrows-layer { position: absolute; inset: 0; pointer-events: none; }
  .arrow { position: absolute; transition: opacity 200ms ease; }
  .arrow-glyph { font-size: 22px; font-weight: 700; text-shadow: 0 0 12px currentColor; }

  .danger-strip { position: absolute; pointer-events: none; opacity: 0; transition: opacity 250ms ease; }
  .danger-strip.on { opacity: 1; }

  .banner {
    position: absolute; left: 50%; top: 16%; transform: translateX(-50%);
    padding: 10px 26px; background: rgba(0,0,0,0.55); border: 1px solid var(--accent);
    border-radius: 8px; font-size: 20px; font-weight: 700; letter-spacing: 0.24em;
    color: var(--accent); pointer-events: none; opacity: 0; z-index: 5; white-space: nowrap;
  }
  .banner.show { animation: q-banner 1400ms ease forwards; }
  @keyframes q-banner {
    0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); border-radius: 12px;
  }
  .overlay-inner {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 24px 32px; background: var(--bg-2);
    border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    max-height: 94%; max-width: 94%; overflow: auto;
  }
  .overlay-title { font-size: 28px; font-weight: 700; letter-spacing: 0.22em; text-align: center; }
  .overlay-sub { font-size: 12px; color: var(--fg-mute); letter-spacing: 0.18em; text-align: center; }
  .overlay-btn {
    margin-top: 8px; padding: 10px 22px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 5px; font-size: 13px; font-weight: 600; letter-spacing: 0.18em; cursor: pointer;
  }
  .menu-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .pick-btn {
    padding: 8px 14px; background: var(--bg-3); color: var(--fg-2); border: 1px solid var(--line);
    border-radius: 5px; font-size: 12px; font-weight: 600; letter-spacing: 0.14em; cursor: pointer;
  }
  .pick-btn.sel { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .pick-btn:disabled { opacity: 0.35; cursor: default; }
  .pick-sub { font-size: 10px; color: var(--fg-mute); letter-spacing: 0.14em; }
  .go-stats { display: grid; grid-template-columns: auto auto; gap: 3px 20px; font-size: 12px; }
  .go-stats .k { color: var(--fg-mute); letter-spacing: 0.1em; }
  .go-stats .v { text-align: right; color: var(--fg); }
  .top10 { border-collapse: collapse; font-size: 11px; }
  .top10 td, .top10 th { padding: 2px 8px; text-align: right; color: var(--fg-2); }
  .top10 th { color: var(--fg-mute); font-weight: 500; letter-spacing: 0.12em; font-size: 9px; text-transform: uppercase; }

  .footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--fg-mute); letter-spacing: 0.16em; padding: 0 4px;
  }
  .footer-cell { text-transform: uppercase; }
  .footer-btn {
    background: none; border: none; color: var(--fg-mute); cursor: pointer;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; padding: 0;
  }
  .footer-btn:hover { color: var(--fg-2); }
  .footer-group { display: flex; gap: 18px; }

  /* settings panel */
  .settings {
    position: fixed; right: 16px; bottom: 16px; z-index: 50; width: 280px;
    background: var(--bg-2); color: var(--fg);
    border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    padding: 14px; display: none; flex-direction: column; gap: 12px;
  }
  .settings.open { display: flex; }
  .settings-hd { display: flex; align-items: center; justify-content: space-between; }
  .settings-hd b { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; }
  .settings-x {
    appearance: none; border: 0; background: transparent; color: var(--fg-mute);
    width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .settings-x:hover { background: rgba(255,255,255,0.06); color: var(--fg); }
  .set-sect { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-mute); padding-top: 4px; }
  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 12px; }
  .set-row label { color: var(--fg-2); }
  .set-row .val { color: var(--fg-mute); font-variant-numeric: tabular-nums; }
  .set-field {
    appearance: none; height: 28px; padding: 0 8px; min-width: 0;
    border: 1px solid var(--line); border-radius: 7px;
    background: var(--bg); color: var(--fg); font: inherit; font-size: 12px; outline: none;
  }
  button.set-field { cursor: pointer; }
  .set-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .toggle {
    position: relative; width: 34px; height: 20px; border: 0; border-radius: 999px;
    background: var(--line); cursor: pointer; padding: 0; transition: background .15s; flex-shrink: 0;
  }
  .toggle[data-on="1"] { background: var(--accent); }
  .toggle i { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%;
    background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: transform .15s; }
  .toggle[data-on="1"] i { transform: translateX(14px); }

  /* ---- touch controls (mobile) ---- */
  .touch-controls { display: none; grid-column: 1 / -1; flex-direction: column; gap: 8px; }
  .touch-row { display: flex; gap: 8px; }
  .touch-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
    min-height: 52px; background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 10px; color: var(--fg); font-size: 22px; font-weight: 600;
    letter-spacing: 0.06em;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    touch-action: none; cursor: pointer;
  }
  .touch-btn:active { background: var(--bg-3); border-color: var(--accent); }
  .touch-btn.small { font-size: 11px; letter-spacing: 0.1em; min-height: 40px; }

  /* compact HOLD/NEXT preview strip shown only on the mobile layout */
  .mobile-hud { display: none; gap: 10px; align-items: center; justify-content: center; }
  .mobile-hud-item { display: flex; align-items: center; gap: 6px; padding: 4px 8px; background: var(--bg-2); border: 1px solid var(--line-soft); border-radius: 6px; }
  .mobile-hud-label { font-size: 9px; letter-spacing: 0.16em; color: var(--fg-mute); }
  .mobile-hud-preview { min-width: 40px; min-height: 20px; display: flex; align-items: center; justify-content: center; }
  .mobile-hud-preview.empty { opacity: 0.35; }
  .hud-btn {
    background: var(--bg-2); border: 1px solid var(--line-soft); border-radius: 6px;
    color: var(--fg-2); font-size: 14px; padding: 4px 10px; cursor: pointer;
  }

  @media (pointer: coarse) {
    .touch-controls { display: flex; padding: 2px 2px calc(4px + env(safe-area-inset-bottom, 0px)); }
  }

  @media (max-width: 900px) {
    .middle { display: flex; flex-direction: column; min-height: 0; gap: 8px; }
    .rail { display: none; }
    .mobile-hud { display: flex; }
    .board-outer { flex: 1; min-height: 0; }
    .header { padding: 4px 2px; }
    .wordmark { font-size: 17px; letter-spacing: 0.14em; }
    .tagline { display: none; }
    .stats { gap: 12px; }
    .stat-value { font-size: 18px; }
    .stat-label { font-size: 9px; }
    .footer { display: none; }
    .frame { gap: 8px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";
// ===================================================================
// Quadtris — center-out tetromino game.
// Grid: selectable odd sizes 19..43. Center 3x3 (the immutable "core").
// Rings are concentric squares around the core; complete a full ring to
// clear it. Pure game logic below is framework-free; the UI is plain DOM.
// ===================================================================

const GRID_SIZES = [19, 25, 31, 37, 43];
let SIZE, CENTER, N_RINGS;

const PIECE_COLORS = {
  I: 'oklch(0.78 0.14 215)', // cyan
  O: 'oklch(0.84 0.14 95)',  // yellow
  T: 'oklch(0.70 0.18 320)', // magenta
  S: 'oklch(0.78 0.16 150)', // green
  Z: 'oklch(0.70 0.18 25)',  // red
  L: 'oklch(0.78 0.16 60)',  // orange
  J: 'oklch(0.68 0.16 260)', // blue
};

const PIECE_SHAPES = {
  I: [[0,0],[0,1],[0,2],[0,3]],
  O: [[0,0],[0,1],[1,0],[1,1]],
  T: [[0,0],[0,1],[0,2],[1,1]],
  L: [[0,0],[0,1],[0,2],[1,0]],
  J: [[0,0],[0,1],[0,2],[1,2]],
  S: [[0,1],[0,2],[1,0],[1,1]],
  Z: [[0,0],[0,1],[1,1],[1,2]],
};

const PIECE_TYPES = Object.keys(PIECE_SHAPES);

const DELTAS = {
  N: [ 1,  0],  // entering from north -> moves south (row +1)
  S: [-1,  0],
  W: [ 0,  1],
  E: [ 0, -1],
};

function ringOf(r, c) {
  const d = Math.max(Math.abs(r - CENTER), Math.abs(c - CENTER));
  return d <= 1 ? 0 : d - 1;
}
function isCenter(r, c) { return ringOf(r, c) === 0; }
function inBounds(r, c) { return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }

function emptyGrid() {
  return Array.from({length: SIZE}, () => Array.from({length: SIZE}, () => null));
}
function cloneGrid(g) { return g.map(row => row.slice()); }

// --- piece transforms ---------------------------------------------------
function normalize(cells) {
  let minR = Infinity, minC = Infinity;
  for (const [r, c] of cells) { if (r < minR) minR = r; if (c < minC) minC = c; }
  return cells.map(([r, c]) => [r - minR, c - minC]);
}
function rotateShapeCW(cells)  { return normalize(cells.map(([r, c]) => [c, -r])); }

function spawnPiece(type, dir) {
  let shape = PIECE_SHAPES[type].map(c => c.slice());
  let rots = 0;
  if (dir === 'E') rots = 1;
  else if (dir === 'S') rots = 2;
  else if (dir === 'W') rots = 3;
  for (let i = 0; i < rots; i++) shape = rotateShapeCW(shape);

  const rows = shape.map(c => c[0]);
  const cols = shape.map(c => c[1]);
  const h = Math.max(...rows) + 1;
  const w = Math.max(...cols) + 1;

  let originR, originC;
  if (dir === 'N')      { originR = -h;    originC = CENTER - Math.floor((w - 1) / 2); }
  else if (dir === 'S') { originR = SIZE;  originC = CENTER - Math.floor((w - 1) / 2); }
  else if (dir === 'W') { originR = CENTER - Math.floor((h - 1) / 2); originC = -w; }
  else                  { originR = CENTER - Math.floor((h - 1) / 2); originC = SIZE; }

  const cells = shape.map(([r, c]) => [r + originR, c + originC]);
  return { type, color: PIECE_COLORS[type], cells, dir };
}

function rotatePieceCells(cells, cw) {
  const [pr, pc] = cells[1] || cells[0];
  return cells.map(([r, c]) => {
    const dr = r - pr, dc = c - pc;
    return cw ? [pr + dc, pc - dr] : [pr - dc, pc + dr];
  });
}

// --- collision / locking ------------------------------------------------
function isPieceValid(cells, grid, dir) {
  for (const [r, c] of cells) {
    if (isCenter(r, c)) return false;
    if (inBounds(r, c) && grid[r][c]) return false;
    if (dir === 'N' || dir === 'S') {
      if (c < 0 || c >= SIZE) return false;
    } else {
      if (r < 0 || r >= SIZE) return false;
    }
    if (dir === 'N' && r >= SIZE) return false;
    if (dir === 'S' && r < 0) return false;
    if (dir === 'W' && c >= SIZE) return false;
    if (dir === 'E' && c < 0) return false;
  }
  return true;
}

function movePiece(piece, dr, dc) {
  return { ...piece, cells: piece.cells.map(([r, c]) => [r + dr, c + dc]) };
}
function pieceStep(piece) {
  const [dr, dc] = DELTAS[piece.dir];
  return movePiece(piece, dr, dc);
}
function tryRotatePiece(piece, grid, cw) {
  const rotated = rotatePieceCells(piece.cells, cw);
  const candidate = { ...piece, cells: rotated };
  const kicks = [
    [0, 0], [0, 1], [0, -1], [1, 0], [-1, 0],
    [0, 2], [0, -2], [2, 0], [-2, 0],
  ];
  for (const [dr, dc] of kicks) {
    const c2 = candidate.cells.map(([r, c]) => [r + dr, c + dc]);
    if (isPieceValid(c2, grid, piece.dir)) return { ...candidate, cells: c2 };
  }
  return piece;
}
function tryShiftPiece(piece, grid, lateral) {
  let dr = 0, dc = 0;
  if (piece.dir === 'N' || piece.dir === 'S') dc = lateral;
  else dr = lateral;
  const moved = movePiece(piece, dr, dc);
  return isPieceValid(moved.cells, grid, piece.dir) ? moved : piece;
}
function lockPiece(piece, grid) {
  const g = cloneGrid(grid);
  let off = false;
  for (const [r, c] of piece.cells) {
    if (!inBounds(r, c)) { off = true; continue; }
    g[r][c] = piece.color;
  }
  return { grid: g, gameOver: off };
}

// --- rings --------------------------------------------------------------
function ringCells(k) {
  const d = k + 1;
  const out = [];
  for (let r = CENTER - d; r <= CENTER + d; r++) {
    for (let c = CENTER - d; c <= CENTER + d; c++) {
      if (Math.max(Math.abs(r - CENTER), Math.abs(c - CENTER)) === d) {
        if (inBounds(r, c)) out.push([r, c]);
      }
    }
  }
  return out;
}
function findCompleteRings(grid) {
  const rings = [];
  for (let k = 1; k <= N_RINGS; k++) {
    const cells = ringCells(k);
    if (cells.every(([r, c]) => grid[r][c])) rings.push(k);
  }
  return rings;
}
function clearRings(grid, rings) {
  const g = cloneGrid(grid);
  for (const k of rings) {
    for (const [r, c] of ringCells(k)) g[r][c] = null;
  }
  return g;
}

// --- connectivity -------------------------------------------------------
// A locked piece is legal only if it is joined to the solid core through a
// chain of filled cells (4-connectivity). Flood-fill outward from the core
// over filled cells; the piece is connected if any of its cells is reached.
function isConnectedToCore(grid, cells) {
  const seen = Array.from({ length: SIZE }, () => new Array(SIZE).fill(false));
  const stack = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (isCenter(r, c)) { seen[r][c] = true; stack.push([r, c]); }
  }
  const filled = (r, c) => inBounds(r, c) && (isCenter(r, c) || !!grid[r][c]);
  const nbrs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
  while (stack.length) {
    const [r, c] = stack.pop();
    for (const [dr, dc] of nbrs) {
      const nr = r + dr, nc = c + dc;
      if (inBounds(nr, nc) && !seen[nr][nc] && filled(nr, nc)) { seen[nr][nc] = true; stack.push([nr, nc]); }
    }
  }
  return cells.some(([r, c]) => inBounds(r, c) && seen[r][c]);
}

// --- collapse toward center --------------------------------------------
// After a ring clears, every remaining cell is attracted to the 3x3 core.
// Cells sharing the core's row/column band (the four "cross" arms) slide
// straight inward; off-axis cells (the diagonal quadrants) move diagonally
// until they enter an arm, then slide straight. A cell stops when it hits a
// filled cell or the solid core. Resolved per-phase (all straight moves,
// then all diagonal moves), innermost-ring first and clockwise from the top.
// Returns the settled grid plus each moved cell's path (for the animation).
function inCoreBand(v) { return v >= CENTER - 1 && v <= CENTER + 1; }
function isCrossCell(r, c) { return !isCenter(r, c) && (inCoreBand(r) || inCoreBand(c)); }
function isDiagCell(r, c)  { return !isCenter(r, c) && !inCoreBand(r) && !inCoreBand(c); }
function solidAt(g, r, c)  { return !inBounds(r, c) || isCenter(r, c) || !!g[r][c]; }

// Straight direction toward the core for a cell sitting in one of the arms.
function armDir(r, c) {
  if (inCoreBand(c)) return [Math.sign(CENTER - r), 0]; // N/S arm -> vertical
  return [0, Math.sign(CENTER - c)];                    // E/W arm -> horizontal
}

// Ordering: innermost ring first, then clockwise starting from the top.
function clockAngle(r, c) {
  let a = Math.atan2(c - CENTER, CENTER - r); // 0 at top, increasing clockwise
  if (a < 0) a += Math.PI * 2;
  return a;
}
function collapseOrder(a, b) {
  const ra = ringOf(a[0], a[1]), rb = ringOf(b[0], b[1]);
  if (ra !== rb) return ra - rb;
  return clockAngle(a[0], a[1]) - clockAngle(b[0], b[1]);
}

function computeCollapse(grid) {
  const g = cloneGrid(grid);
  const paths = [];
  const record = (path, color) => { if (path.length > 1) paths.push({ color, path }); };

  // Phase 1 — straight gravity within the cross arms.
  const crossCells = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (g[r][c] && isCrossCell(r, c)) crossCells.push([r, c]);
  }
  crossCells.sort(collapseOrder);
  for (const [r0, c0] of crossCells) {
    const color = g[r0][c0];
    if (!color) continue;
    const [dr, dc] = armDir(r0, c0);
    g[r0][c0] = null;
    let nr = r0, nc = c0;
    const path = [[nr, nc]];
    while (!solidAt(g, nr + dr, nc + dc)) { nr += dr; nc += dc; path.push([nr, nc]); }
    g[nr][nc] = color;
    record(path, color);
  }

  // Phase 2 — diagonal approach until aligned, then straight to rest.
  const diagCells = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (g[r][c] && isDiagCell(r, c)) diagCells.push([r, c]);
  }
  diagCells.sort(collapseOrder);
  for (const [r0, c0] of diagCells) {
    const color = g[r0][c0];
    if (!color) continue;
    g[r0][c0] = null;
    let nr = r0, nc = c0;
    const path = [[nr, nc]];
    const ddr = Math.sign(CENTER - nr), ddc = Math.sign(CENTER - nc);
    // Diagonal: stop on alignment with an arm, or when blocked (stays off-axis).
    while (!inCoreBand(nr) && !inCoreBand(nc) && !solidAt(g, nr + ddr, nc + ddc)) {
      nr += ddr; nc += ddc; path.push([nr, nc]);
    }
    // Straight: only if it actually reached an arm.
    if (inCoreBand(nr) || inCoreBand(nc)) {
      const [sdr, sdc] = armDir(nr, nc);
      while (!solidAt(g, nr + sdr, nc + sdc)) { nr += sdr; nc += sdc; path.push([nr, nc]); }
    }
    g[nr][nc] = color;
    record(path, color);
  }

  return { grid: g, paths };
}

// --- board rotation -----------------------------------------------------
function rotateGridCW(grid) {
  const g = emptyGrid();
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (grid[r][c]) g[c][SIZE - 1 - r] = grid[r][c];
  }
  return g;
}
function rotateGridCCW(grid) {
  const g = emptyGrid();
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (grid[r][c]) g[SIZE - 1 - c][r] = grid[r][c];
  }
  return g;
}

// --- seeded RNG -----------------------------------------------------------
// mulberry32 over a plain uint32 counter (S.rngState), so runs are fully
// reproducible (daily mode shares one board worldwide) and the state is a
// single serializable number (save/resume).
function hashStr(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function rngNext() {
  S.rngState = (S.rngState + 0x6D2B79F5) >>> 0;
  let t = S.rngState;
  t = Math.imul(t ^ (t >>> 15), t | 1);
  t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

// --- bag randomizer -----------------------------------------------------
function newBag() {
  const a = PIECE_TYPES.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rngNext() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===================================================================
// Presentation constants
// ===================================================================
const CELL_PX = 24;
const GAP_PX = 2;
let BOARD_PX, NATIVE;

// Sets SIZE/CENTER/N_RINGS and the derived pixel dimensions for a run. Safe
// to call again later (selectable field size) — buildShell() re-reads these.
function configureGrid(size) {
  SIZE = size;
  CENTER = (size - 1) / 2;
  N_RINGS = CENTER - 1;
  BOARD_PX = SIZE * CELL_PX + (SIZE - 1) * GAP_PX;
  NATIVE = BOARD_PX + 72;
}

const SPEEDS = { Chill: 750, Medium: 520, Brisk: 380, Fast: 260 };
// Faster gravity settings earn proportionally more points, so best-score
// comparisons stay honest across speed choices.
const SPEED_MULT = { Chill: 0.8, Medium: 1, Brisk: 1.25, Fast: 1.5 };
const DIR_ARROW = { N: '↓', S: '↑', W: '→', E: '←' };

const SPRINT_GOAL = 10;
const DAILY_SIZE = 31;
const MODE_INFO = {
  classic: { label: 'CLASSIC', desc: 'endless · full rules' },
  zen:     { label: 'ZEN',     desc: 'no game over · build freely' },
  sprint:  { label: 'SPRINT',  desc: `clear ${SPRINT_GOAL} rings against the clock` },
  daily:   { label: 'DAILY',   desc: `one shared seeded board a day · ${DAILY_SIZE}×${DAILY_SIZE}` },
};

// ===================================================================
// Settings + persistence (localStorage)
// ===================================================================
const SETTINGS_DEFAULTS = { speed: 'Medium', showHint: true, softDropMult: 6, showRings: true, gridSize: 31, touchMode: 'both' };
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw != null) return JSON.parse(raw);
  } catch (e) {}
  return fallback;
}
function saveJSON(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}
function loadSettings() { return { ...SETTINGS_DEFAULTS, ...loadJSON('quadtris.settings', {}) }; }
function saveSettings(s) { saveJSON('quadtris.settings', s); }

// --- records: best per mode+size, global top-10 runs ----------------------
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function fmtTime(ms) {
  const t = Math.max(0, Math.floor(ms));
  const m = Math.floor(t / 60000), s = Math.floor((t % 60000) / 1000), d = Math.floor((t % 1000) / 100);
  return `${m}:${String(s).padStart(2, '0')}.${d}`;
}
function bestKey() { return `${S.mode}:${SIZE}`; }
function getBest() { return loadJSON('quadtris.best', {})[bestKey()] || null; }

// Update best-score / top-10 records at the end of a run. Sprint runs rank
// by time (only when the goal was reached); everything else by score.
// Returns true when this run set a new best for the current mode+size.
function recordGameEnd() {
  let newBest = false;
  const all = loadJSON('quadtris.best', {});
  const prev = all[bestKey()];
  if (S.mode === 'sprint') {
    if (S.winner && (!prev || S.elapsedMs < prev.timeMs)) {
      all[bestKey()] = { timeMs: S.elapsedMs, score: S.score, date: todayStr() };
      newBest = true;
    }
  } else if (!prev || S.score > prev.score) {
    all[bestKey()] = { score: S.score, rings: S.ringsCleared, date: todayStr() };
    newBest = true;
  }
  if (newBest) saveJSON('quadtris.best', all);
  const top = loadJSON('quadtris.top10', []);
  top.push({ score: S.score, rings: S.ringsCleared, size: SIZE, mode: S.mode, date: todayStr() });
  top.sort((a, b) => b.score - a.score);
  saveJSON('quadtris.top10', top.slice(0, 10));
  return newBest;
}

// --- save & resume ---------------------------------------------------------
// The whole run is one plain object, snapshotted at every lock (and on
// pause / tab-hide), so a reload or accidental close never eats a run.
const RUN_KEY = 'quadtris.run';
function saveRun() {
  if (S.awaitingStart || S.gameOver) return;
  saveJSON(RUN_KEY, {
    v: 1, size: SIZE, mode: S.mode, grid: S.grid, piece: S.piece,
    bag: S.bag, nextType: S.nextType, nextSide: S.nextSide,
    hold: S.hold, holdUsed: S.holdUsed,
    score: S.score, ringsCleared: S.ringsCleared, level: S.level,
    bombs: S.bombs, rngState: S.rngState, lastDifficult: S.lastDifficult,
    stats: S.stats, elapsedMs: S.elapsedMs,
  });
}
function loadSavedRun() {
  const run = loadJSON(RUN_KEY, null);
  return run && run.v === 1 && GRID_SIZES.includes(run.size) && MODE_INFO[run.mode] ? run : null;
}
function clearSavedRun() {
  try { localStorage.removeItem(RUN_KEY); } catch (e) {}
}

// ===================================================================
// Game state
// ===================================================================
function newStats() { return { pieces: 0, holds: 0, bombsUsed: 0, maxChain: 0 }; }

const S = {
  grid: null, // set by configureGrid()+emptyGrid() at boot, once SIZE is known
  piece: null,
  bag: [],    // filled once a run starts (the shuffle consumes the seeded RNG)
  nextType: null,
  nextSide: null,
  score: 0,
  ringsCleared: 0,
  level: 1,
  paused: false,
  gameOver: false,
  winner: false,        // sprint goal reached (the game-over overlay becomes a win screen)
  flash: null,          // { rings: [k] }
  softDrop: false,
  rotating: null,       // { dir: 'cw' | 'ccw' }
  collapsing: null,     // { finals: Set<"r,c"> } while the collapse animation plays
  bombs: 3,             // column-bomb charges
  hold: null,           // held piece type
  holdUsed: false,      // hold already spent for the piece currently in play
  grounded: false,      // piece can't fall further; lock-delay grace period active
  lockResets: 0,        // lock-delay grace refreshes spent on the current piece
  awaitingStart: true,  // showing the mode/size menu, game not yet running
  mode: 'classic',
  rngState: 0,          // mulberry32 counter (seeded per run)
  lastDifficult: false, // previous clearing lock was multi-ring/cascade (back-to-back)
  buffered: null,       // one input kind queued while an animation owned the board
  deathCause: null,     // 'wall' | 'disconnect'
  deathCells: null,     // Set<"r,c"> — the cells of the piece that ended the run
  newBest: false,       // last run set a record (shown on the overlay)
  stats: newStats(),    // per-run counters for the end-of-run stats block
  elapsedMs: 0,         // active play time (pauses excluded); sprint clock
  settings: loadSettings(),
};

const BOMB_START = 3;
const BOMB_MAX = 5;
const BOMB_EVERY_RINGS = 5;
const LOCK_DELAY_MS = 500;
const LOCK_DELAY_MAX_RESETS = 1;
// ===================================================================
// Loop / input bookkeeping (module-level, not part of the saved run)
// ===================================================================
let rafId = null, lastTs = null, gravAcc = 0;
let lockRemainMs = null;            // counts down while grounded; lock at 0
const DAS_MS = 170, ARR_MS = 40;    // delayed auto shift: initial delay, repeat rate
let dasDir = 0, dasTime = 0, arrAcc = 0;
let dasHeld = { left: false, right: false };
let touchHoldTimer = null, touchRepeatTimer = null;
let keyListenersWired = false, globalWired = false;
let scaleObserver = null, scaleResizeHandler = null;
let bannerTimer = null;
let restartArm = null;              // pending two-tap restart confirmation
let menuMode = null, menuSize = null; // start-menu selections (persist across renders)

// --- ghost & queue helpers ------------------------------------------------
function ghostPiece() {
  if (!S.piece) return null;
  let p = S.piece;
  while (true) {
    const next = pieceStep(p);
    if (isPieceValid(next.cells, S.grid, p.dir)) p = next;
    else break;
  }
  return p;
}
// Would locking the ghost here end the run? Drives the warning ghost: the
// disconnect rule kills invisibly otherwise.
function ghostFatal(g) {
  if (S.mode === 'zen') return false;
  if (g.cells.some(([r, c]) => !inBounds(r, c))) return true;
  const { grid: locked } = lockPiece(g, S.grid);
  return !isConnectedToCore(locked, g.cells.filter(([r, c]) => inBounds(r, c)));
}

function drawNext(bag) {
  let b = bag.slice();
  if (b.length === 0) b = newBag();
  const type = b.shift();
  return { type, side: 'N', bag: b };
}

// All scoring passes through here so the speed multiplier applies uniformly.
function addScore(pts) {
  S.score += Math.max(0, Math.round(pts * (SPEED_MULT[S.settings.speed] || 1)));
}

// ===================================================================
// Game flow
// ===================================================================
function spawnFromQueue() {
  let type = S.nextType, side = S.nextSide || 'N', b = S.bag;
  if (!type) { const d = drawNext(b); type = d.type; side = d.side; b = d.bag; }
  const p = spawnPiece(type, side);
  const d2 = drawNext(b);
  S.bag = d2.bag; S.nextType = d2.type; S.nextSide = d2.side;
  if (!isPieceValid(p.cells, S.grid, p.dir)) { gameEnd('wall', null); return; }
  S.piece = p;
  S.holdUsed = false;
  S.stats.pieces++;
  resetGroundState();
  update();
  flushBuffered();
}

// Replay the input that arrived while an animation owned the board.
function flushBuffered() {
  const k = S.buffered;
  S.buffered = null;
  if (k && S.piece && !S.paused && !S.gameOver) action(k);
}

function holdSwap() {
  if (!S.piece || S.holdUsed) return;
  const curType = S.piece.type;
  S.stats.holds++;
  if (S.hold == null) {
    S.hold = curType;
    S.piece = null;
    spawnFromQueue();
  } else {
    const swapType = S.hold;
    S.hold = curType;
    const p = spawnPiece(swapType, 'N');
    if (!isPieceValid(p.cells, S.grid, p.dir)) { gameEnd('wall', null); return; }
    S.piece = p;
  }
  resetGroundState();
  S.holdUsed = true;
  update();
}

function isBoardEmpty(g) {
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (g[r][c]) return false;
  return true;
}

// Clears every complete ring in `grid` (with flash), collapses toward the
// core, then re-checks the settled grid for rings the collapse itself
// completed — chaining until a pass finds none. Chained passes score with a
// rising cascade multiplier (×2, ×3, …); a multi-ring pass or any cascade
// counts as "difficult" for the back-to-back ×1.5 bonus on the NEXT one.
// `pieceBonus` (the flat lock bonus) is only awarded once, on the first pass.
function settleRings(grid, pieceBonus, onDone) {
  const lock = { total: 0, difficult: false, b2b: false };
  const pass = (g, chain, bonus) => {
    const rings = findCompleteRings(g);
    if (rings.length === 0) {
      if (bonus) addScore(10);
      S.grid = g;
      finishSettle(lock);
      onDone();
      return;
    }
    S.stats.maxChain = Math.max(S.stats.maxChain, chain);
    if (chain === 1) {
      lock.difficult = rings.length > 1;
      lock.b2b = rings.length > 1 && S.lastDifficult;
    } else {
      lock.difficult = true;
    }
    lock.total += rings.length;
    S.flash = { rings };
    S.grid = g;
    update();
    setTimeout(() => {
      const cleared = clearRings(g, rings);
      const { grid: finalGrid, paths } = computeCollapse(cleared);
      S.flash = null;
      let gained = rings.reduce((s, k) => s + 100 * k, 0) * (rings.length > 1 ? 2 : 1) * chain;
      if (lock.b2b) gained *= 1.5;
      addScore(gained + (bonus ? 10 : 0));
      const oldRings = S.ringsCleared;
      S.ringsCleared += rings.length;
      const newLevel = 1 + Math.floor(S.ringsCleared / 4);
      if (newLevel !== S.level) {
        S.level = newLevel;
        showBanner(`LEVEL ${newLevel}`);
        bumpStat(el.level);
        announce(`Level ${newLevel}.`);
      }
      const earned = Math.floor(S.ringsCleared / BOMB_EVERY_RINGS) - Math.floor(oldRings / BOMB_EVERY_RINGS);
      if (earned > 0) S.bombs = Math.min(BOMB_MAX, S.bombs + earned);
      announce(`Cleared ${rings.length} ring${rings.length > 1 ? 's' : ''}${chain > 1 ? `, cascade chain ${chain}` : ''}. Score ${S.score}.`);
      runCollapseAnimation(cleared, finalGrid, paths, () => pass(finalGrid, chain + 1, false));
    }, 320);
  };
  pass(grid, 1, pieceBonus);
}

function finishSettle(lock) {
  if (lock.total === 0) return;
  if (lock.b2b) showBanner('BACK-TO-BACK ×1.5');
  S.lastDifficult = lock.difficult;
  if (isBoardEmpty(S.grid)) {
    addScore(1000);
    showBanner('PERFECT CLEAR');
    announce('Perfect clear! Plus 1000.');
  }
}

function lockAndClear(p) {
  resetGroundState();
  const { grid: locked, gameOver: off } = lockPiece(p, S.grid);
  const pieceCells = p.cells.filter(([r, c]) => inBounds(r, c));
  if (S.mode !== 'zen') {
    if (off) { S.grid = locked; gameEnd('wall', pieceCells); return; }
    if (!isConnectedToCore(locked, pieceCells)) { S.grid = locked; gameEnd('disconnect', pieceCells); return; }
  }
  S.piece = null;
  settleRings(locked, true, () => {
    if (S.mode === 'sprint' && S.ringsCleared >= SPRINT_GOAL) { sprintWin(); return; }
    saveRun();
    spawnFromQueue();
  });
}

// Ends the run: record why (named on the overlay) and which cells did it
// (painted in the warn color on the final board), update records, drop the
// auto-save.
function gameEnd(cause, cells) {
  S.piece = null;
  S.gameOver = true;
  S.winner = false;
  S.deathCause = cause;
  S.deathCells = cells && cells.length ? new Set(cells.map(([r, c]) => `${r},${c}`)) : null;
  S.newBest = recordGameEnd();
  clearSavedRun();
  announce(cause === 'disconnect'
    ? `Game over: piece locked disconnected from the core. Score ${S.score}.`
    : `Game over: piece locked beyond the outer wall. Score ${S.score}.`);
  update();
}

function sprintWin() {
  S.piece = null;
  S.gameOver = true;
  S.winner = true;
  S.deathCause = null;
  S.deathCells = null;
  S.newBest = recordGameEnd();
  clearSavedRun();
  announce(`Sprint complete in ${fmtTime(S.elapsedMs)}. Score ${S.score}.`);
  update();
}

// Animates cells sliding along their collapse paths, then commits finalGrid.
function runCollapseAnimation(fromGrid, finalGrid, paths, onDone) {
  if (paths.length === 0) {
    S.grid = finalGrid;
    S.collapsing = null;
    onDone();
    return;
  }
  const finals = new Set(paths.map(p => {
    const [r, c] = p.path[p.path.length - 1];
    return `${r},${c}`;
  }));
  S.collapsing = { finals };
  S.grid = finalGrid;
  update();

  const layer = el.collapse;
  layer.innerHTML = '';
  const PITCH = CELL_PX + GAP_PX;
  const STEP_MS = 40;
  let maxSteps = 0;
  for (const { color, path } of paths) {
    const [r0, c0] = path[0];
    const div = document.createElement('div');
    div.style.cssText = `position:absolute;width:${CELL_PX}px;height:${CELL_PX}px;border-radius:4px;`
      + `background:${color};border:1px solid rgba(255,255,255,0.12);`
      + `left:${c0 * PITCH}px;top:${r0 * PITCH}px;`;
    layer.appendChild(div);
    const frames = path.map(([r, c]) => ({ left: `${c * PITCH}px`, top: `${r * PITCH}px` }));
    maxSteps = Math.max(maxSteps, path.length - 1);
    div.animate(frames, { duration: (path.length - 1) * STEP_MS, easing: 'linear', fill: 'forwards' });
  }
  setTimeout(() => {
    layer.innerHTML = '';
    S.collapsing = null;
    S.grid = finalGrid;
    onDone();
  }, maxSteps * STEP_MS + 60);
}

// --- lock delay -----------------------------------------------------------
function resetGroundState() {
  lockRemainMs = null;
  S.grounded = false;
  S.lockResets = 0;
}
function armLockDelay() { lockRemainMs = LOCK_DELAY_MS; }

// After a successful move/rotate: refresh the grace period (bounded), or
// clear it if the piece can fall again.
function onPieceAdjusted() {
  const grounded = !isPieceValid(pieceStep(S.piece).cells, S.grid, S.piece.dir);
  if (!grounded) { resetGroundState(); return; }
  if (!S.grounded) {
    S.grounded = true;
    S.lockResets = 0;
    armLockDelay();
    return;
  }
  if (S.lockResets < LOCK_DELAY_MAX_RESETS) {
    S.lockResets++;
    armLockDelay();
  }
}
function applyPieceChange(next) {
  if (next !== S.piece) {
    S.piece = next;
    onPieceAdjusted();
  }
  update();
}

// --- gravity ---------------------------------------------------------------
function tick() {
  if (!S.piece || S.paused || S.gameOver) return;
  if (S.grounded) return; // grace period; the frame loop counts it down
  const moved = pieceStep(S.piece);
  if (isPieceValid(moved.cells, S.grid, S.piece.dir)) {
    S.piece = moved;
    if (S.softDrop) addScore(1); // soft-dropped cells score, like classic Tetris
    update();
  } else {
    S.grounded = true;
    S.lockResets = 0;
    armLockDelay();
    update();
  }
}

// ===================================================================
// Main loop — a single requestAnimationFrame driver replaces the old
// setInterval gravity + setTimeout lock delay: gravity, lock delay, DAS
// auto-shift and the sprint clock all advance from the same dt, freeze
// together on pause, and can't drift under load.
// ===================================================================
function currentInterval() {
  const base = SPEEDS[S.settings.speed] || 520;
  const lvlScale = Math.pow(0.92, S.level - 1);
  return Math.max(80, base * lvlScale / (S.softDrop ? S.settings.softDropMult : 1));
}

function frame(ts) {
  rafId = requestAnimationFrame(frame);
  const dt = lastTs == null ? 0 : Math.min(100, ts - lastTs);
  lastTs = ts;
  if (S.awaitingStart || S.paused || S.gameOver) return;
  S.elapsedMs += dt;
  if (S.mode === 'sprint' && el.time) el.time.textContent = fmtTime(S.elapsedMs);
  if (!S.piece || S.flash || S.rotating || S.collapsing) return;
  dasFrame(dt);
  if (!S.piece || S.gameOver) return;
  if (S.grounded) {
    if (lockRemainMs != null) {
      lockRemainMs -= dt;
      if (lockRemainMs <= 0) {
        lockRemainMs = null;
        lockAndClear(S.piece);
      }
    }
    return;
  }
  gravAcc += dt;
  let steps = 0;
  while (gravAcc >= currentInterval() && steps++ < SIZE) {
    gravAcc -= currentInterval();
    tick();
    if (!S.piece || S.grounded || S.paused || S.gameOver) { gravAcc = 0; break; }
  }
}

// --- DAS/ARR: in-game auto-shift instead of OS key repeat ------------------
function dasStart(dir) {
  dasDir = dir;
  dasTime = 0;
  arrAcc = 0;
  action(dir < 0 ? 'left' : 'right');
}
function dasStop() {
  const held = dasHeld.left ? -1 : dasHeld.right ? 1 : 0;
  if (held) dasStart(held); // the other direction is still held: switch to it
  else { dasDir = 0; dasTime = 0; arrAcc = 0; }
}
function dasFrame(dt) {
  if (!dasDir) return;
  dasTime += dt;
  if (dasTime < DAS_MS) return;
  arrAcc += dt;
  while (arrAcc >= ARR_MS) {
    arrAcc -= ARR_MS;
    action(dasDir < 0 ? 'left' : 'right');
  }
}

// ===================================================================
// Actions
// ===================================================================
const BUFFERABLE = new Set(['left', 'right', 'rotCW', 'rotCCW', 'hold']);

function togglePause() {
  S.paused = !S.paused;
  if (S.paused) saveRun();
  update();
}

function action(kind) {
  if (S.gameOver || S.awaitingStart) return;
  if (kind === 'pause') { togglePause(); return; }
  if (S.paused) return;
  if (!S.piece || S.rotating || S.collapsing || S.flash) {
    // An animation owns the board: remember the latest intent and replay it
    // the moment control returns, instead of eating the press.
    if (BUFFERABLE.has(kind)) S.buffered = kind;
    return;
  }

  if (kind === 'left') {
    applyPieceChange(tryShiftPiece(S.piece, S.grid, -1));
  } else if (kind === 'right') {
    applyPieceChange(tryShiftPiece(S.piece, S.grid, 1));
  } else if (kind === 'rotCW') {
    applyPieceChange(tryRotatePiece(S.piece, S.grid, true));
  } else if (kind === 'rotCCW') {
    applyPieceChange(tryRotatePiece(S.piece, S.grid, false));
  } else if (kind === 'hold') {
    holdSwap();
  } else if (kind === 'down') {
    S.softDrop = true;
    // While grounded, a fresh down input commits the lock immediately —
    // standard Tetris feel instead of a mushy half-second wait.
    if (S.grounded) { lockAndClear(S.piece); return; }
  } else if (kind === 'hardDrop') {
    let p = S.piece, dist = 0;
    while (true) {
      const next = pieceStep(p);
      if (isPieceValid(next.cells, S.grid, p.dir)) { p = next; dist++; }
      else break;
    }
    addScore(dist * 2); // hard-drop distance scores double the soft-drop rate
    lockAndClear(p);
  } else if (kind === 'bomb') {
    if (!bombReady()) return;
    const col = bombColumn();
    const g = cloneGrid(S.grid);
    let removed = 0;
    for (let r = 0; r < SIZE; r++) {
      if (!isCenter(r, col) && g[r][col]) { g[r][col] = null; removed++; }
    }
    if (removed === 0) return;
    S.bombs--;
    S.stats.bombsUsed++;
    S.grid = g;
    const { grid: finalGrid, paths } = computeCollapse(g);
    runCollapseAnimation(g, finalGrid, paths, () => {
      resetGroundState();
      if (S.piece && !isPieceValid(S.piece.cells, S.grid, S.piece.dir)) {
        S.piece = null;
        spawnFromQueue();
      } else {
        update();
        flushBuffered();
      }
    });
  } else if (kind === 'boardCW' || kind === 'boardCCW') {
    const cw = kind === 'boardCW';
    const newGrid = cw ? rotateGridCW(S.grid) : rotateGridCCW(S.grid);
    if (S.piece && !isPieceValid(S.piece.cells, newGrid, 'N')) return;
    S.rotating = { dir: cw ? 'cw' : 'ccw' };
    S.score = Math.max(0, S.score - 2);
    update();
    setTimeout(() => {
      S.grid = newGrid;
      S.rotating = null;
      resetGroundState();
      update();
      flushBuffered();
    }, 320);
  }
}

// The bomb clears the column under the current piece's pivot cell.
function bombColumn() {
  if (!S.piece) return CENTER;
  const [, pc] = S.piece.cells[1] || S.piece.cells[0];
  return Math.min(SIZE - 1, Math.max(0, pc));
}
function bombReady() {
  return S.bombs > 0 && S.piece && !S.paused && !S.gameOver && !S.rotating && !S.collapsing && !S.flash;
}

// During a soft-drop drag on the touch board: advance one cell without ever
// committing a lock (a drag should not trigger the grounded insta-lock).
function gestureSoftStep() {
  if (!S.piece || S.paused || S.gameOver || S.rotating || S.collapsing || S.flash) return;
  if (S.grounded) return;
  const moved = pieceStep(S.piece);
  if (isPieceValid(moved.cells, S.grid, S.piece.dir)) {
    S.piece = moved;
    addScore(1);
    update();
  } else {
    S.grounded = true;
    S.lockResets = 0;
    armLockDelay();
    update();
  }
}

// ===================================================================
// Run lifecycle
// ===================================================================
// Resets all run state and (re)builds the board for the given size + mode.
function startNewRun(size, mode) {
  mode = MODE_INFO[mode] ? mode : 'classic';
  if (mode === 'daily') size = DAILY_SIZE;
  if (!GRID_SIZES.includes(size)) size = 31;
  S.awaitingStart = false;
  configureGrid(size);
  S.settings.gridSize = size;
  saveSettings(S.settings);
  S.mode = mode;
  S.rngState = mode === 'daily'
    ? hashStr('quadtris-' + todayStr())
    : (Math.floor(Math.random() * 4294967296) >>> 0);
  S.grid = emptyGrid();
  S.piece = null;
  S.hold = null;
  S.holdUsed = false;
  S.bag = newBag();
  S.nextType = null;
  S.nextSide = null;
  S.score = 0;
  S.ringsCleared = 0;
  S.level = 1;
  S.paused = false;
  S.gameOver = false;
  S.winner = false;
  S.flash = null;
  S.rotating = null;
  S.collapsing = null;
  S.bombs = BOMB_START;
  S.softDrop = false;
  S.lastDifficult = false;
  S.buffered = null;
  S.deathCause = null;
  S.deathCells = null;
  S.newBest = false;
  S.stats = newStats();
  S.elapsedMs = 0;
  gravAcc = 0;
  clearSavedRun();
  resetGroundState();
  buildShell();
  spawnFromQueue();
}

function restart() { startNewRun(SIZE, S.mode); }

function backToMenu() {
  S.awaitingStart = true;
  S.gameOver = false;
  S.winner = false;
  S.paused = false;
  S.piece = null;
  S.flash = null;
  S.rotating = null;
  S.collapsing = null;
  S.deathCause = null;
  S.deathCells = null;
  S.grid = emptyGrid();
  update();
}

// Rehydrate a saved run (RESUME RUN on the start menu).
function resumeRun(run) {
  S.awaitingStart = false;
  configureGrid(run.size);
  S.mode = run.mode;
  S.grid = run.grid;
  S.piece = run.piece;
  S.bag = run.bag || [];
  S.nextType = run.nextType;
  S.nextSide = run.nextSide;
  S.hold = run.hold != null ? run.hold : null;
  S.holdUsed = !!run.holdUsed;
  S.score = run.score || 0;
  S.ringsCleared = run.ringsCleared || 0;
  S.level = run.level || 1;
  S.bombs = typeof run.bombs === 'number' ? run.bombs : BOMB_START;
  S.rngState = (run.rngState || 0) >>> 0;
  S.lastDifficult = !!run.lastDifficult;
  S.stats = { ...newStats(), ...(run.stats || {}) };
  S.elapsedMs = run.elapsedMs || 0;
  S.paused = false;
  S.gameOver = false;
  S.winner = false;
  S.flash = null;
  S.rotating = null;
  S.collapsing = null;
  S.softDrop = false;
  S.buffered = null;
  S.deathCause = null;
  S.deathCells = null;
  S.newBest = false;
  gravAcc = 0;
  resetGroundState();
  buildShell();
  if (!S.piece) spawnFromQueue();
  else update();
}
// ===================================================================
// Rendering
// ===================================================================
const el = {};                       // cached element refs, refreshed by buildShell()
let cellEls = null, cellPrev = null; // persistent per-cell divs + last-drawn state key
let bombAimLast = null;
let overlayKey = null;

function cellGridCSS(inset0) {
  const pos = inset0
    ? 'position:absolute;inset:0;'
    : `position:absolute;top:8px;left:8px;width:${BOARD_PX}px;height:${BOARD_PX}px;`;
  return pos + `display:grid;grid-template-rows:repeat(${SIZE}, ${CELL_PX}px);`
    + `grid-template-columns:repeat(${SIZE}, ${CELL_PX}px);gap:${GAP_PX}px;`;
}

function pieceShapeSVG(type, cell) {
  const shape = PIECE_SHAPES[type];
  const rows = Math.max(...shape.map(c => c[0])) + 1;
  const cols = Math.max(...shape.map(c => c[1])) + 1;
  const g = 2;
  const w = cols * cell + (cols - 1) * g, h = rows * cell + (rows - 1) * g;
  const rects = shape.map(([r, c]) =>
    `<rect x="${c * (cell + g)}" y="${r * (cell + g)}" width="${cell}" height="${cell}" rx="2.5" fill="${PIECE_COLORS[type]}"/>`
  ).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">${rects}</svg>`;
}

function renderNext() {
  el.next.innerHTML = S.nextType ? pieceShapeSVG(S.nextType, 14) : '<div class="placeholder">—</div>';
  if (el.nextMobile) {
    el.nextMobile.innerHTML = S.nextType ? pieceShapeSVG(S.nextType, 7) : '—';
    el.nextMobile.classList.toggle('empty', !S.nextType);
  }
}

function renderHold() {
  el.hold.innerHTML = S.hold ? pieceShapeSVG(S.hold, 14) : '<div class="placeholder">empty</div>';
  el.hold.style.opacity = S.holdUsed ? '0.45' : '1';
  if (el.holdMobile) {
    el.holdMobile.innerHTML = S.hold ? pieceShapeSVG(S.hold, 7) : '—';
    el.holdMobile.classList.toggle('empty', !S.hold);
    el.holdMobile.style.opacity = S.holdUsed ? '0.45' : '1';
  }
}

function renderCurrent() {
  if (!S.piece) { el.current.innerHTML = '<div class="placeholder">—</div>'; return; }
  el.current.innerHTML = `<div class="current-row">${pieceShapeSVG(S.piece.type, 12)}<div>`
    + `<div class="piece-tag mono" style="color:${S.piece.color};border-color:${S.piece.color};">${S.piece.type}</div>`
    + `<div class="kicker" style="margin-top:6px;">SOUTHBOUND ${DIR_ARROW[S.piece.dir]}</div>`
    + `</div></div>`;
}

// Static background: faint cell pads + the solid golden core block.
function buildBackground() {
  const bg = el.bg;
  bg.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (isCenter(r, c)) continue;
      const d = document.createElement('div');
      d.style.cssText = `grid-row:${r + 1};grid-column:${c + 1};background:var(--bg-2);border-radius:4px;opacity:0.5;`;
      frag.appendChild(d);
    }
  }
  bg.appendChild(frag);
  const PITCH = CELL_PX + GAP_PX;
  const core = document.createElement('div');
  const x = (CENTER - 1) * PITCH;
  const sz = 3 * CELL_PX + 2 * GAP_PX;
  core.style.cssText = `position:absolute;left:${x}px;top:${x}px;width:${sz}px;height:${sz}px;`
    + `border-radius:6px;background:linear-gradient(135deg, var(--core), var(--core-2));`
    + `display:flex;align-items:center;justify-content:center;color:var(--bg);`
    + `font-size:10px;font-weight:700;letter-spacing:0.18em;box-shadow:0 0 18px rgba(0,0,0,0.35);`;
  core.textContent = 'CORE';
  bg.appendChild(core);
}

// Persistent board layers: ring-outline SVG (one rect per ring, restyled by
// renderRingOutlines) and one div per playable cell (mutated in place by
// renderCells — no more full innerHTML rebuild per gravity tick).
function buildBoardLayers() {
  const wrap = el.rotwrap;
  wrap.innerHTML = '';
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${BOARD_PX} ${BOARD_PX}`);
  svg.setAttribute('aria-hidden', 'true');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
  const PITCH = CELL_PX + GAP_PX;
  el.ringRects = [];
  for (let k = 1; k <= N_RINGS; k++) {
    const d = k + 1;
    const x = (CENTER - d) * PITCH - GAP_PX / 2;
    const span = 2 * d + 1;
    const sz = span * CELL_PX + (span - 1) * GAP_PX + GAP_PX;
    const rect = document.createElementNS(svgNS, 'rect');
    rect.setAttribute('x', String(x));
    rect.setAttribute('y', String(x));
    rect.setAttribute('width', String(sz));
    rect.setAttribute('height', String(sz));
    rect.setAttribute('rx', '4');
    rect.setAttribute('fill', 'none');
    rect.setAttribute('stroke', 'var(--line)');
    rect.setAttribute('stroke-dasharray', '2 4');
    svg.appendChild(rect);
    el.ringRects.push(rect);
  }
  el.ringsSvg = svg;
  wrap.appendChild(svg);

  const gridEl = document.createElement('div');
  gridEl.style.cssText = cellGridCSS(true);
  cellEls = [];
  cellPrev = [];
  for (let r = 0; r < SIZE; r++) {
    const rowE = [], rowP = [];
    for (let c = 0; c < SIZE; c++) {
      if (isCenter(r, c)) { rowE.push(null); rowP.push(''); continue; }
      const d = document.createElement('div');
      d.style.cssText = `grid-row:${r + 1};grid-column:${c + 1};border-radius:4px;display:none;border:1px solid rgba(255,255,255,0.12);`;
      gridEl.appendChild(d);
      rowE.push(d);
      rowP.push('');
    }
    cellEls.push(rowE);
    cellPrev.push(rowP);
  }
  wrap.appendChild(gridEl);
}

function renderCells() {
  const flashing = new Set();
  if (S.flash) for (const k of S.flash.rings) for (const [r, c] of ringCells(k)) flashing.add(`${r},${c}`);
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const div = cellEls[r][c];
      if (!div) continue;
      const key = `${r},${c}`;
      const color = S.grid[r][c];
      // Cells whose collapse animation is in flight stay hidden until it lands.
      const hidden = S.collapsing && S.collapsing.finals.has(key);
      const flashHere = flashing.has(key);
      const death = S.deathCells && S.deathCells.has(key);
      const state = hidden || !color ? '' : `${color}|${flashHere ? 1 : 0}|${death ? 1 : 0}`;
      if (cellPrev[r][c] === state) continue;
      cellPrev[r][c] = state;
      if (!state) { div.style.display = 'none'; continue; }
      div.style.display = 'block';
      div.style.background = color;
      div.style.boxShadow = flashHere
        ? 'inset 0 0 0 2px var(--fg), 0 0 14px var(--fg)'
        : death ? 'inset 0 0 0 2px var(--warn), 0 0 12px var(--warn)' : 'none';
    }
  }
}

function renderBoardSpin() {
  const want = S.rotating ? (S.rotating.dir === 'cw' ? 'q-rot-cw' : 'q-rot-ccw') : '';
  if (el.rotwrap.dataset.spin === want) return;
  el.rotwrap.dataset.spin = want;
  el.rotwrap.classList.remove('q-rot-cw', 'q-rot-ccw');
  if (want) {
    void el.rotwrap.offsetWidth;
    el.rotwrap.classList.add(want);
  }
}

// All rings outlined faintly; the incomplete ring closest to completion
// (≥75% filled) is highlighted so the outline carries information.
function renderRingOutlines() {
  if (!el.ringsSvg) return;
  el.ringsSvg.style.display = S.settings.showRings ? '' : 'none';
  if (!S.settings.showRings) return;
  let bestK = 0, bestFill = 0;
  for (let k = 1; k <= N_RINGS; k++) {
    const cells = ringCells(k);
    let filled = 0;
    for (const [r, c] of cells) if (S.grid[r][c]) filled++;
    const f = filled / cells.length;
    if (f < 1 && f > bestFill) { bestFill = f; bestK = k; }
  }
  for (let k = 1; k <= N_RINGS; k++) {
    const rect = el.ringRects[k - 1];
    const hot = k === bestK && bestFill >= 0.75;
    rect.setAttribute('stroke', hot ? 'var(--accent)' : 'var(--line)');
    rect.setAttribute('opacity', hot ? '0.9' : '0.28');
    rect.setAttribute('stroke-width', hot ? '1.5' : '1');
  }
}

// Warn tint on any board edge the stack has grown within 3 cells of.
function renderDanger() {
  const M = 3;
  let n = false, s = false, w = false, e = false;
  if (S.mode !== 'zen' && !S.awaitingStart && S.grid) {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (!S.grid[r][c]) continue;
        if (r < M) n = true;
        if (r >= SIZE - M) s = true;
        if (c < M) w = true;
        if (c >= SIZE - M) e = true;
      }
    }
  }
  el.dangerN.classList.toggle('on', n);
  el.dangerS.classList.toggle('on', s);
  el.dangerW.classList.toggle('on', w);
  el.dangerE.classList.toggle('on', e);
}

function renderBombAim() {
  const key = bombReady() && S.piece ? String(bombColumn()) : '';
  if (key === bombAimLast) return;
  bombAimLast = key;
  if (!key) { el.bombAim.innerHTML = ''; return; }
  const col = Number(key);
  const PITCH = CELL_PX + GAP_PX;
  el.bombAim.innerHTML = `<div style="position:absolute;top:0;bottom:0;left:${col * PITCH - GAP_PX / 2}px;`
    + `width:${CELL_PX + GAP_PX}px;`
    + `background:linear-gradient(to bottom, transparent, oklch(0.78 0.16 30 / 0.10), transparent);`
    + `border-left:1px dashed oklch(0.78 0.16 30 / 0.35);border-right:1px dashed oklch(0.78 0.16 30 / 0.35);"></div>`;
}

function renderPieces() {
  const piece = S.piece;
  let html = '';
  if (piece) {
    const ghost = ghostPiece();
    if (ghost) {
      // The ghost turns into a pulsing warn outline when locking at the
      // landing spot would end the run (disconnect or off-board).
      const fatal = ghostFatal(ghost);
      const pieceKeys = new Set(piece.cells.map(([r, c]) => `${r},${c}`));
      const col = fatal ? 'var(--warn)' : ghost.color;
      for (const [r, c] of ghost.cells) {
        if (!inBounds(r, c) || pieceKeys.has(`${r},${c}`)) continue;
        html += `<div style="grid-row:${r + 1};grid-column:${c + 1};position:relative;">`
          + `<div style="position:absolute;inset:3px;border-radius:3px;border:1.5px dashed ${col};`
          + `opacity:${fatal ? 0.95 : 0.45};${fatal ? 'animation:q-ghost-warn 700ms ease-in-out infinite;' : ''}"></div></div>`;
      }
    }
    for (const [r, c] of piece.cells) {
      if (!inBounds(r, c)) continue;
      html += `<div style="grid-row:${r + 1};grid-column:${c + 1};background:${piece.color};`
        + `border-radius:4px;border:1px solid rgba(255,255,255,0.25);box-shadow:0 0 10px ${piece.color};"></div>`;
    }
  }
  el.pieces.innerHTML = html;
}

// --- transient feedback -----------------------------------------------------
function showBanner(text) {
  if (!el.banner) return;
  el.banner.textContent = text;
  el.banner.classList.remove('show');
  void el.banner.offsetWidth;
  el.banner.classList.add('show');
  if (bannerTimer) clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => el.banner && el.banner.classList.remove('show'), 1450);
}
function bumpStat(elm) {
  if (!elm) return;
  elm.classList.remove('bump');
  void elm.offsetWidth;
  elm.classList.add('bump');
}
// Screen-reader announcements (aria-live region).
function announce(msg) {
  if (el.live) el.live.textContent = msg;
}

// --- overlays ---------------------------------------------------------------
function renderOverlay() {
  const key = S.awaitingStart ? `menu:${menuMode}:${menuSize}`
    : S.gameOver ? `over:${S.winner ? 1 : 0}`
    : S.paused ? 'paused' : '';
  if (key === overlayKey) return;
  overlayKey = key;
  if (S.awaitingStart) { renderStartMenu(); return; }
  if (S.gameOver) { renderGameOver(); return; }
  if (S.paused) { renderPaused(); return; }
  el.overlay.innerHTML = '';
}

function renderStartMenu() {
  if (menuMode == null || !MODE_INFO[menuMode]) menuMode = 'classic';
  if (menuSize == null || !GRID_SIZES.includes(menuSize)) {
    menuSize = GRID_SIZES.includes(S.settings.gridSize) ? S.settings.gridSize : 31;
  }
  const saved = loadSavedRun();
  const dailyLock = menuMode === 'daily';
  const shownSize = dailyLock ? DAILY_SIZE : menuSize;
  el.overlay.innerHTML = `<div class="overlay"><div class="overlay-inner" role="dialog" aria-label="New game setup">`
    + `<div class="overlay-title">QUADTRIS</div>`
    + `<div class="overlay-sub">${MODE_INFO[menuMode].desc}</div>`
    + `<div class="menu-row" role="group" aria-label="Game mode">`
    + Object.keys(MODE_INFO).map(m =>
        `<button class="pick-btn mono${m === menuMode ? ' sel' : ''}" data-mode="${m}">${MODE_INFO[m].label}</button>`).join('')
    + `</div>`
    + `<div class="menu-row" role="group" aria-label="Field size">`
    + GRID_SIZES.map(sz =>
        `<button class="pick-btn mono${sz === shownSize ? ' sel' : ''}" data-size="${sz}"${dailyLock ? ' disabled' : ''}>${sz}×${sz}</button>`).join('')
    + `</div>`
    + `<button class="overlay-btn" id="q-start">START</button>`
    + (saved
        ? `<button class="overlay-btn" id="q-resume-run" style="background:var(--bg-3);color:var(--fg);">RESUME RUN · ${MODE_INFO[saved.mode].label} ${saved.size}×${saved.size} · ${saved.score} pts</button>`
        : '')
    + `</div></div>`;
  el.overlay.querySelectorAll('[data-mode]').forEach(b =>
    b.addEventListener('click', () => { menuMode = b.dataset.mode; renderOverlay(); }));
  el.overlay.querySelectorAll('[data-size]').forEach(b =>
    b.addEventListener('click', () => { menuSize = Number(b.dataset.size); renderOverlay(); }));
  document.getElementById('q-start').addEventListener('click', () => startNewRun(shownSize, menuMode));
  const res = document.getElementById('q-resume-run');
  if (res) res.addEventListener('click', () => {
    const run = loadSavedRun();
    if (run) resumeRun(run);
  });
  const sb = document.getElementById('q-start');
  if (sb && !el.overlay.contains(document.activeElement)) sb.focus();
}

function renderPaused() {
  el.overlay.innerHTML = `<div class="overlay"><div class="overlay-inner" role="dialog" aria-label="Paused">`
    + `<div class="overlay-title">PAUSED</div>`
    + `<div class="overlay-sub">P or the pause button resumes</div>`
    + `<button class="overlay-btn" id="q-resume-btn">RESUME</button>`
    + `<div class="menu-row" style="margin-top:4px;">`
    + `<button class="pick-btn mono" id="q-pause-restart">RESTART</button>`
    + `<button class="pick-btn mono" id="q-pause-menu">MENU</button>`
    + `</div></div></div>`;
  document.getElementById('q-resume-btn').addEventListener('click', togglePause);
  document.getElementById('q-pause-restart').addEventListener('click', restart);
  document.getElementById('q-pause-menu').addEventListener('click', backToMenu);
  const rb = document.getElementById('q-resume-btn');
  if (rb && !el.overlay.contains(document.activeElement)) rb.focus();
}

function renderGameOver() {
  const st = S.stats;
  const causeTxt = S.winner ? `all ${SPRINT_GOAL} rings cleared` :
    S.deathCause === 'disconnect' ? 'DISCONNECTED FROM CORE — the piece locked without touching the structure'
    : S.deathCause === 'wall' ? 'HIT THE WALL — the piece locked partly beyond the board edge'
    : '';
  const best = getBest();
  const top = loadJSON('quadtris.top10', []);
  const rows = top.map((t, i) =>
    `<tr><td>${i + 1}</td><td>${t.score}</td><td>${t.rings}</td><td>${t.size}</td><td>${MODE_INFO[t.mode] ? MODE_INFO[t.mode].label : t.mode}</td><td>${t.date}</td></tr>`).join('');
  el.overlay.innerHTML = `<div class="overlay"><div class="overlay-inner" role="alertdialog" aria-label="${S.winner ? 'Sprint complete' : 'Game over'}">`
    + `<div class="overlay-title">${S.winner ? 'SPRINT COMPLETE' : 'GAME OVER'}</div>`
    + (causeTxt ? `<div class="overlay-sub" style="color:${S.winner ? 'var(--accent)' : 'var(--warn)'};max-width:340px;">${causeTxt}</div>` : '')
    + (S.newBest ? `<div class="overlay-sub" style="color:var(--accent);">★ NEW BEST</div>` : '')
    + `<div class="go-stats mono">`
    + `<span class="k">SCORE</span><span class="v">${S.score}</span>`
    + `<span class="k">RINGS</span><span class="v">${S.ringsCleared}</span>`
    + (best ? `<span class="k">BEST</span><span class="v">${S.mode === 'sprint' ? fmtTime(best.timeMs) : best.score}</span>` : '')
    + `<span class="k">TIME</span><span class="v">${fmtTime(S.elapsedMs)}</span>`
    + `<span class="k">PIECES</span><span class="v">${st.pieces}</span>`
    + `<span class="k">HOLDS</span><span class="v">${st.holds}</span>`
    + `<span class="k">BOMBS USED</span><span class="v">${st.bombsUsed}</span>`
    + `<span class="k">LONGEST CHAIN</span><span class="v">${st.maxChain}</span>`
    + `</div>`
    + (rows ? `<div class="overlay-sub" style="margin-top:6px;">TOP 10</div>`
      + `<table class="top10 mono"><tr><th></th><th>score</th><th>rings</th><th>size</th><th>mode</th><th>date</th></tr>${rows}</table>` : '')
    + `<div class="menu-row" style="margin-top:8px;">`
    + `<button class="overlay-btn" id="q-go-restart" style="margin-top:0;">RESTART</button>`
    + `<button class="overlay-btn" id="q-go-menu" style="margin-top:0;background:var(--bg-3);color:var(--fg);">MENU</button>`
    + (S.mode === 'daily'
        ? `<button class="overlay-btn" id="q-go-share" style="margin-top:0;background:var(--bg-3);color:var(--fg);">COPY RESULT</button>`
        : '')
    + `</div>`
    + (S.mode !== 'daily'
        ? `<div class="menu-row">`
          + GRID_SIZES.map(sz => `<button class="pick-btn mono${sz === SIZE ? ' sel' : ''}" data-gsize="${sz}">${sz}×${sz}</button>`).join('')
          + `</div><div class="pick-sub">restart at a different size</div>`
        : '')
    + `</div></div>`;
  document.getElementById('q-go-restart').addEventListener('click', restart);
  document.getElementById('q-go-menu').addEventListener('click', backToMenu);
  const share = document.getElementById('q-go-share');
  if (share) share.addEventListener('click', () => {
    const txt = `Quadtris Daily ${todayStr()} · ${S.score} pts · ${S.ringsCleared} rings`;
    if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => { share.textContent = 'COPIED!'; }, () => {});
  });
  el.overlay.querySelectorAll('[data-gsize]').forEach(b =>
    b.addEventListener('click', () => startNewRun(Number(b.dataset.gsize), S.mode)));
  const rb = document.getElementById('q-go-restart');
  if (rb && !el.overlay.contains(document.activeElement)) rb.focus();
}

// --- main render --------------------------------------------------------------
function update() {
  if (!el.score) return;
  el.score.textContent = String(S.score).padStart(6, '0');
  el.rings.textContent = String(S.ringsCleared).padStart(2, '0');
  el.level.textContent = String(S.level).padStart(2, '0');
  const mult = SPEED_MULT[S.settings.speed] || 1;
  el.scoreMult.textContent = mult !== 1 ? ` ×${mult}` : '';
  const best = getBest();
  el.best.textContent = S.mode === 'sprint'
    ? (best ? fmtTime(best.timeMs) : '—')
    : (best ? String(best.score).padStart(6, '0') : '—');
  el.timeWrap.style.display = S.mode === 'sprint' ? '' : 'none';
  if (S.mode === 'sprint') el.time.textContent = fmtTime(S.elapsedMs);
  el.pauseLabel.textContent = S.paused ? 'RESUME' : 'PAUSE';
  el.bombLabel.textContent = `BOMB ×${S.bombs}`;
  el.bombBtn.style.opacity = S.bombs > 0 ? '1' : '0.4';
  const prog = ((S.ringsCleared % BOMB_EVERY_RINGS) + BOMB_EVERY_RINGS) % BOMB_EVERY_RINGS;
  el.bombPips.textContent = '●'.repeat(prog) + '○'.repeat(BOMB_EVERY_RINGS - prog);
  if (el.touchPauseLabel) el.touchPauseLabel.textContent = S.paused ? 'RESUME' : 'PAUSE';
  if (el.touchBombLabel) el.touchBombLabel.textContent = `BOMB ×${S.bombs} · ${prog}/${BOMB_EVERY_RINGS}`;
  renderNext();
  renderHold();
  renderCurrent();
  renderBoardSpin();
  renderCells();
  renderRingOutlines();
  renderDanger();
  renderBombAim();
  renderPieces();
  renderOverlay();
}
